        type: string
      example: 'Deposit,Withdrawal'
    optionalFeeStationFiatTransactionTypeParam:
      name: transaction_type
      in: query
      required: false
      description: |
        The type of the fiat transaction. Possible values include:
          - `deposit`: A deposit transaction.
          - `transfer`: A transfer transaction.
      schema:
        $ref: '#/components/schemas/FeeStationFiatTransactionType'
      example: deposit
    ReportTypeOptionalParam:
      name: report_type
      in: query
      required: false
      description: |
        ReportType defines the type of the report:
        - `Order`: Summary of all merchants' order.
        - `OrderTransaction`: Transaction summary of all merchants' orders.
        - `TopUpTransaction`: Transaction summary of all top ups.
        - `PayinWeeklyStatement`: Weekly report of all payins (including order-in and top up).
        - `PayinDailyStatement`: Daily report of all payins (including order-in and top up).
        - `CryptoPayout`: Transaction summary of all crypto settlements.
        - `OffRamp`: Transaction summary of all off ramp settlements.
        - `Refund`: Transaction summary of all refunds.
        - `PayoutWeeklyStatement`: Weekly report of all payouts (including crypto settlements, off ramp settlements and refund).
        - `PayoutDailyStatement`: Daily report of all payouts (including crypto settlements, off ramp settlements and refund).
        - `PayinCommissionFee`: Commission fee summary of all payins.
        - `PayoutCommissionFee`: Commission fee summary of all payouts.
        - `BalanceChange`: Balance change summary of all merchants.
        - `Summary`: Summary of all payins, payouts and commission fees.
      schema:
        $ref: '#/components/schemas/ReportType'
    ReportStatusOptionalParam:
      name: report_status
      in: query
      required: false
      description: |
        ReportStatus defines the status of the report:
        - `Completed`: The report has been completed.
        - `Failed`: The report has failed.
        - `Expired`: The report is expired.
      schema:
        $ref: '#/components/schemas/ReportStatus'
