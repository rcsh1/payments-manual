    TopUpAddress:
      type: object
      description: The details of top up address
      required:
        - address
        - payer_id
        - custom_payer_id
        - merchant_id
        - token_id
        - min_amount
      properties:
        address:
          type: string
          description: |
            Dedicated deposit address assigned to the specified custom_payer_id. The address is guaranteed to be unique under the same merchant and token's blockchain network (chain).
          example: 0x1234567890abcdef...
        payer_id:
          type: string
          description: |
            Unique payer identifier on the Cobo side, auto-generated by the system.
          example: P20250619T0310056d7aa
        custom_payer_id:
          type: string
          description: |
            Unique user identifier on the merchant side, used to assign a dedicated deposit address.
          example: user_abc_10001
        merchant_id:
          type: string
          description: |
            Merchant ID assigned by the system, e.g., 'M1001'.
          example: M1001
        token_id:
          type: string
          description: |
            The token ID for the top-up, e.g., 'ETH_USDT' refers to USDT on the Ethereum network.
          example: ETH_USDT
        chain:
          type: string
          description: |
            Blockchain network identifier, e.g., 'ETH' for Ethereum, 'TRON' for Tron.
          example: ETH
        developer_fee_rate:
          type: string
          description: |
            Developer fee rate for this token. For example, 0.01 represents a 1% fee.
          example: '0.01'
        min_amount:
          type: string
          description: |
            Minimum deposit amount allowed for this address. Deposits below this threshold may not be credited.
          example: '0.1'
        created_timestamp:
          type: integer
          description: 'The created time of the payer address, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the payer address, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    UpdateTopUpAddress:
      type: object
      description: The request body to update top up address.
      required:
        - token_id
        - custom_payer_id
      properties:
        merchant_id:
          type: string
          description: The merchant ID.
          example: M1001
        token_id:
          type: string
          description: |
            The token ID, which identifies the cryptocurrency. Supported values: 
              - USDC: `ETH_USDC`, `ARBITRUM_USDC`, `SOL_USDC`, `BASE_USDC`, `MATIC_USDC`, `BSC_USDC`
              - USDT: `TRON_USDT`, `ETH_USDT`, `ARBITRUM_USDT`, `SOL_USDT`, `BASE_USDT`, `MATIC_USDT`, `BSC_USDT`
          example: ETH_USDT
        custom_payer_id:
          type: string
          description: |
            Unique customer identifier on the merchant side, used to allocate a dedicated top-up address
          example: payer_0001
    CreateTopUpAddresses:
      type: object
      description: The request body to batch create top-up address.
      required:
        - token_id
        - custom_payer_ids
      properties:
        merchant_id:
          type: string
          description: 'The merchant ID. If not provided, the default merchant created during organization initialization will be used.'
          example: M1001
        token_id:
          type: string
          description: |
            The token ID, which identifies the cryptocurrency.
          example: ETH_USDT
        custom_payer_ids:
          type: array
          maxItems: 50
          description: |
            A list of unique custom payer IDs required to create top-up addresses.
            The maximum number of items is 50.
          items:
            type: string
            description: 'Unique customer identifier on the merchant side, used to allocate a dedicated top-up address'
            example: O20250304-P1001-1001
    SweepToAddress:
