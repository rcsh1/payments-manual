          example: Transaction to sign a message initiated from a wallet
        category_names:
          type: array
          description: The custom category for you to identify your transactions.
          items:
            type: string
            example: Trading
    InternalMessageSignDestination:
      oneOf:
        - $ref: '#/components/schemas/EvmEIP191MessageSignDestination'
        - $ref: '#/components/schemas/EvmEIP712MessageSignDestination'
        - $ref: '#/components/schemas/InternalRawMessageSignDestination'
        - $ref: '#/components/schemas/BTCBIP137MessageSignDestination'
        - $ref: '#/components/schemas/BTCBIP322MessageSignDestination'
        - $ref: '#/components/schemas/CosmosAdr36MessageSignDestination'
      discriminator:
        propertyName: destination_type
        mapping:
          EVM_EIP_191_Signature: '#/components/schemas/EvmEIP191MessageSignDestination'
          EVM_EIP_712_Signature: '#/components/schemas/EvmEIP712MessageSignDestination'
          Raw_Message_Signature: '#/components/schemas/InternalRawMessageSignDestination'
          BTC_BIP_137_Signature: '#/components/schemas/BTCBIP137MessageSignDestination'
          BTC_BIP_322_Signature: '#/components/schemas/BTCBIP322MessageSignDestination'
          COSMOS_ADR_36_Signature: '#/components/schemas/CosmosAdr36MessageSignDestination'
    InternalMessageSignDestinationType:
      type: string
      enum:
        - EVM_EIP_191_Signature
        - EVM_EIP_712_Signature
        - BTC_BIP_137_Signature
        - BTC_BIP_322_Signature
        - COSMOS_ADR_36_Signature
        - Raw_Message_Signature
      example: EVM_EIP_191_Signature
      description: |
        The type of the signature format. Refer to [Transaction sources and destinations](https://www.cobo.com/developers/v2/guides/transactions/sources-and-destinations) for a detailed introduction about the supported sources and destinations for each transaction type.

        Each signature format type requires a different set of properties. Switch between the above tabs for details.
    InternalRawMessageSignDestination:
      title: Raw_Message_Signature
      description: 'The information about the destination `Raw_Message_Signature`. Refer to [Transaction sources and destinations](https://www.cobo.com/developers/v2/guides/transactions/sources-and-destinations) for a detailed introduction about the supported sources and destinations for each transaction type.'
      type: object
      required:
        - destination_type
        - msg_hash
      properties:
        destination_type:
          $ref: '#/components/schemas/InternalMessageSignDestinationType'
        msg_hash:
          type: string
          description: 'Message hash to be signed, in hexadecimal format.'
    BankPayoutStatus:
      type: string
      enum:
        - Created
        - PendingRiskCheck
        - RiskRejected
        - PendingApproval
        - Approved
        - Signing
        - BankSent
        - BankProcessing
        - Success
        - Failed
        - RefundProcessing
        - Refunded
      example: Created
      description: |
        The status of the payout.
        - `Created`: The payout is created.
        - `PendingRiskCheck`: The payout is pending risk check.
        - `RiskRejected`: The payout is risk rejected.
        - `PendingApproval`: The payout is pending approval.
        - `Approved`: The payout is approved.
        - `Signing`: The payout is signing.
        - `BankSent`: The payout is bank sent.
        - `BankProcessing`: The payout is bank processing.
        - `Success`: The payout is success.
        - `Failed`: The payout is failed.
        - `RefundProcessing`: The payout is refund processing.
        - `Refunded`: The payout is refunded.
    BankPayoutType:
      type: string
      enum:
        - External
        - Internal
      example: External
      description: |
        The type of the payout.
        - `External`: The payout is an external transfer.
        - `Internal`: The payout is an internal transfer.
    BankTransferType:
      type: string
      enum:
        - Payin
        - Payout
      example: Payout
      description: |
        The transfer type of the transaction.
        - `Payin`: The transaction is a payin.
        - `Payout`: The transaction is a payout.
    BankPayout:
      type: object
      required:
        - payout_id
        - status
        - request_id
        - bank_provider
        - transaction_currency
        - transaction_amount
        - charge_bearer
        - sender
        - beneficiary
      properties:
        payout_id:
          type: string
          description: The payout ID.
          example: 123e4567-e89b-12d3-a456-426614174003
        status:
          $ref: '#/components/schemas/BankPayoutStatus'
        request_id:
          type: string
          description: The request ID of the payout.
          example: 123e4567-e89b-12d3-a456-426614174004
        bank_provider:
          $ref: '#/components/schemas/BankProvider'
        transaction_id:
          type: string
          description: The transaction reference id at bank side.
          example: 20241223-0000008740
        transaction_currency:
          type: string
          description: The currency of the transaction.
          example: USD
        transaction_amount:
          type: string
          description: The amount of the transaction.
          example: '100.00'
        fee_currency:
          type: string
          description: The currency of the fee.
          example: USD
        fee_amount:
          type: string
          description: The amount of the fee.
          example: '1.00'
        remarks:
          type: string
          description: The remarks of the payout.
          example: Please send the payment to the vendor's bank account.
        payout_type:
          $ref: '#/components/schemas/BankPayoutType'
        sender:
          $ref: '#/components/schemas/BankPayoutSender'
        beneficiary:
          $ref: '#/components/schemas/BankPayoutBeneficiary'
        refunded_amount:
          type: string
          description: |
            The amount refunded for this remittance, in `transaction_currency`.
            Populated when `status` is `RefundProcessing` or `Refunded`.
          example: '10.00'
        created_timestamp:
          type: integer
          description: 'The created time of the payout, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the payout, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    BankPayoutSender:
      type: object
      required:
        - account_no
      properties:
        account_no:
          type: string
          description: The account number of the sender.
          example: '1234567890'
        account_name:
          type: string
          description: The name of the sender.
          example: John Doe
    BankPayoutBeneficiary:
      type: object
      required:
        - account_no
        - account_name
      properties:
        bank:
          $ref: '#/components/schemas/BankInfo'
        account_no:
          type: string
          description: The account number of the beneficiary.
          example: '1234567890'
        account_name:
          type: string
          description: The name of the beneficiary.
          example: John Doe
        country:
          type: string
          description: The country of the beneficiary.
          example: USA
        city:
          type: string
          description: The city of the beneficiary.
          example: New York
        address:
          type: string
          description: The address of the beneficiary.
          example: '123 Main St, Anytown, USA'
        intermediary_bank:
          $ref: '#/components/schemas/BankInfo'
    BankInfo:
      type: object
      required:
        - bic
      properties:
        bic:
          type: string
          description: The BIC of the bank.
          example: ABCDEFGH
        name:
          type: string
          description: The name of the bank.
          example: ABC Bank
        address:
          type: string
          description: The address of the bank.
          example: '123 Main St, Anytown, USA'
    BankProvider:
      type: string
      enum:
        - SGB
      example: SGB
      description: |
        The provider of the payout.
        - `SGB`: Singapore Gulf Bank.
    BankSignatureInfo:
      oneOf:
        - $ref: '#/components/schemas/BankSignatureInfoSgb'
