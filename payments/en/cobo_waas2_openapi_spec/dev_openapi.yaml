        - Approved
        - Rejected
      example: Pending
      description: |
        The status of the approval. Possible values include:
          - `Pending`: Waiting for approval from the approver.
          - `Approved`: The approver has agreed to the approval.
          - `Rejected`: The approver has rejected the approval.
    SwapSingingStatus:
      type: string
      enum:
        - Pending
        - Signed
