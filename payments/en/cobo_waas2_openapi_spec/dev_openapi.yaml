          type: string
          description: The merchant ID.
          example: '1001'
        merchant_order_code:
          type: string
          description: A unique reference code assigned by the merchant to identify this order in their system.
          example: M20240201001
        psp_order_code:
          type: string
          description: A unique reference code assigned by the developer to identify this order in their system.
          example: P20240201001
        pricing_currency:
          type: string
          description: The fiat currency of the order.
          example: USD
        pricing_amount:
          type: string
          description: 'The base amount of the order in fiat currency, excluding the developer fee (specified in `fee_amount`).'
          example: '100.00'
        fee_amount:
          type: string
          description: The developer fee for the order in fiat currency. It is added to the base amount (`order_amount`) to determine the final charge.
          example: '2.00'
        payable_currency:
          type: string
          description: The ID of the cryptocurrency used for payment.
          example: ETH_USDT
        chain_id:
          type: string
          description: The ID of the blockchain network where the payment transaction should be made.
          example: ETH
        payable_amount:
          type: string
          description: The cryptocurrency amount to be paid for this order.
          example: '103.03'
        exchange_rate:
          type: string
          description: 'The exchange rate between a currency pair. Expressed as the amount of fiat currency per one unit of cryptocurrency. For example, if the cryptocurrency is USDT and the fiat currency is USD, a rate of "0.99" means 1 USDT = 0.99 USD.'
          example: '0.99'
        amount_tolerance:
          type: string
          description: Allowed amount deviation.
          example: '0.5'
        receive_address:
          type: string
          description: The recipient wallet address to be used for the payment transaction.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        status:
          $ref: '#/components/schemas/OrderStatus'
        received_token_amount:
          type: string
          description: 'The total cryptocurrency amount received for this order. Updates until the expiration time. Precision matches the token standard (e.g., 6 decimals for USDT).'
          example: '103.0305'
        expired_at:
          type: integer
          description: 'The expiration time of the pay-in order, represented as a UNIX timestamp in seconds.'
          example: 1711324800
        created_timestamp:
          type: integer
          description: 'The created time of the order, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the order, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        transactions:
          type: array
          description: An array of transactions associated with this pay-in order. Each transaction represents a separate blockchain operation related to the settlement process.
          items:
            $ref: '#/components/schemas/PaymentTransaction'
        currency:
          type: string
          description: The fiat currency of the order.
          example: USD
        order_amount:
          type: string
          description: 'The base amount of the order in fiat currency, excluding the developer fee (specified in `fee_amount`).'
          example: '100.00'
        token_id:
          type: string
          description: The ID of the cryptocurrency used for payment.
          example: ETH_USDT
        settlement_status:
          $ref: '#/components/schemas/SettleStatus'
    OrderId:
      type: string
      description: Unique identifier of a single order
      example: O20250304-M1001-1001
    OrderStatus:
      type: string
      enum:
        - Pending
        - Processing
        - Completed
        - Expired
        - Underpaid
      example: Pending
      description: |
        The current status of the pay-in order:
        - `Pending`: The order has been created and is awaiting payment. No incoming transaction has been detected.
        - `Processing`: An incoming transaction has been detected at the recipient address.
        - `Completed`: The payment has been fully received and is now complete.
        - `Expired`: The order has reached its expiration time without receiving any payment, or the order has been cancelled by the [Update pay-in order](https://www.cobo.com/developers/v2/api-references/payment/update-pay-in-order) operation.
        - `Underpaid`: The order has reached its expiration time. A payment was received but the amount is less than the order's required amount.
    Refund:
      type: object
      required:
        - refund_id
        - token_id
        - chain_id
        - amount
        - to_address
        - status
      properties:
        request_id:
          type: string
          description: The request ID provided by you when creating the refund request.
          example: 123e4567-e89b-12d3-a456-426614174004
        refund_id:
          type: string
          description: The refund order ID.
          example: R20250304-M1001-1001
        order_id:
          type: string
          description: The order ID corresponding to this refund.
          example: O20250304-M1001-1001
        merchant_id:
          type: string
          description: The merchant ID.
          example: M1001
        token_id:
          type: string
          description: The ID of the cryptocurrency used for refund.
          example: ETH_USDT
        chain_id:
          type: string
          description: The ID of the blockchain network on which the refund transaction occurs.
          example: ETH
        amount:
          type: string
          description: The amount in cryptocurrency to be returned for this refund order.
          example: '0.0025'
        to_address:
          type: string
          description: The recipient's wallet address where the refund will be sent.
          example: '0x9876543210abcdef1234567890abcdef12345678'
        status:
          $ref: '#/components/schemas/RefundStatus'
        refund_type:
          $ref: '#/components/schemas/RefundType'
        created_timestamp:
          type: integer
          description: 'The created time of the refund order, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the refund order, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        initiator:
          type: string
          description: 'The initiator of this refund order, usually the user''s API key.'
          example: b2ae1b5aaade686c968ef2bbd31cc75ba94e5a85fd9cb0b85b81dcc15f920e9d
        transactions:
          type: array
          description: An array of transactions associated with this refund order. Each transaction represents a separate blockchain operation related to the refund process.
          items:
            $ref: '#/components/schemas/PaymentTransaction'
        charge_merchant_fee:
          type: boolean
          description: |
            Whether to charge developer fee to the merchant.

            - `true`: The fee amount (specified in `merchant_fee_amount`) will be deducted from the merchant's balance and added to the developer's balance
            - `false`: The merchant is not charged any developer fee.
          example: false
        merchant_fee_amount:
          type: string
          description: 'The developer fee amount to charge the merchant, denominated in the cryptocurrency specified by `merchant_fee_token_id`.'
          example: '0.0001'
        merchant_fee_token_id:
          type: string
          description: The ID of the cryptocurrency used for the developer fee.
          example: ETH_USDT
        commission_fee:
          $ref: '#/components/schemas/CommissionFee'
    RefundStatus:
      type: string
      enum:
        - AddressPending
        - AddressSubmitted
        - Pending
        - Processing
        - Completed
        - PartiallyCompleted
        - Failed
        - PendingConfirmation
      example: Pending
      description: |
        The current status of the refund order. For information about transaction status, see [Transaction statuses and sub-statuses](https://www.cobo.com/developers/v2/guides/transactions/status). 
        - `AddressPending`: The refund link has been created and opened but the address is not yet submitted.
        - `AddressSubmitted`: The address of the refund link has been submitted.
        - `Pending`: The refund order has been created but the transaction has not been initiated.
        - `Processing`: The refund order is currently being processed, with at least one refund transaction in progress.
        - `Completed`: All refund transactions have been completed successfully.
        - `PartiallyCompleted`: Some refund transactions have been completed successfully, while others have failed.
        - `Failed`: All refund transactions have failed.
        - `PendingConfirmation`: The refund order has been completed but the address to send is pending confirmation.
    RefundType:
      type: string
      enum:
        - Merchant
        - Psp
      example: Merchant
      description: |
        Specifies the source of funds for the refund:
        - `Merchant`: The refund amount will be deducted from the merchant balance.
        - `Psp`: The refund amount will be deducted from the developer balance.
    SettleRequestStatus:
      type: string
      enum:
        - Pending
        - Processing
        - Completed
        - PartiallyCompleted
        - Failed
        - Canceled
      example: Pending
      description: |
        The current status of the settlement request:
        - `Pending`: The settlement request has been created and is awaiting processing.
        - `Processing`: The settlement request is currently being processed, with at least one settlement in progress.
        - `Completed`: All requested settlements have been completed.
        - `PartiallyCompleted`: Some requested settlements have been completed successfully, while others have failed.
        - `Failed`: All requested settlements have failed.
    SettleStatus:
      type: string
      enum:
        - Pending
        - Processing
        - Completed
        - PartiallyCompleted
        - Failed
      example: Pending
      description: |
        The current status of the settlement:
        - `Pending`: The settlement has been created and is awaiting processing.
        - `Processing`: The settlement is being processed.
        - `Completed`: The funds have been successfully deposited into the bank account.
        - `PartiallyCompleted`: Some settlement transactions have been completed successfully, while others have failed.
        - `Failed`: The settlement could not be completed due to an error.
    Settlement:
      type: object
      required:
        - settlement_request_id
        - request_id
        - status
        - settlements
      properties:
        settlement_request_id:
          type: string
          description: The settlement request ID generated by Cobo.
          example: S20250304-1001
        request_id:
          type: string
          description: The request ID provided by you when creating the settlement request.
          example: SETTLEMENT123
        status:
          $ref: '#/components/schemas/SettleRequestStatus'
        settlements:
          type: array
          items:
            $ref: '#/components/schemas/SettlementDetail'
        created_timestamp:
          type: integer
          description: 'The created time of the settlement request, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the settlement request, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        initiator:
          type: string
          description: 'The initiator of this settlement request, usually the user''s API key.'
          example: b2ae1b5aaade686c968ef2bbd31cc75ba94e5a85fd9cb0b35b81dcc15f520e9d
        acquiring_type:
          $ref: '#/components/schemas/AcquiringType'
        payout_channel:
          $ref: '#/components/schemas/PayoutChannel'
        settlement_type:
          $ref: '#/components/schemas/SettlementType'
        currency:
          type: string
          description: The fiat currency for the settlement request.
          example: USD
        received_amount_fiat:
          type: string
          description: |
            The received fiat amount of this settlement request.
          example: '500.00'
        bank_account:
          $ref: '#/components/schemas/BankAccount'
    SettlementDetail:
      type: object
      properties:
        currency:
          type: string
          description: The fiat currency for the settlement.
          example: USD
        token_id:
          type: string
          description: The ID of the cryptocurrency settled.
          example: ETH_USDT
        chain_id:
          type: string
          description: The ID of the blockchain network on which the settlement occurred.
          example: ETH
        merchant_id:
          type: string
          description: The Merchant ID associated with this settlement.
          example: M1001
        amount:
          type: string
          description: |
            The settlement amount.

            - If `token_id` is specified, this represents the settlement amount in the specified cryptocurrency.

            - If `token_id` is not specified, this represents the settlement amount in the specified fiat currency.
          example: '500.00'
        settled_amount:
          type: string
          description: |
            The settled amount of this settlement detail.

            - If `token_id` is specified, this represents the actual settled amount in the specified cryptocurrency.

            - If `token_id` is not specified, this represents the actual settled amount in the specified fiat currency.
          example: '500.00'
        status:
          $ref: '#/components/schemas/SettleStatus'
        bank_account:
          $ref: '#/components/schemas/BankAccount'
        transactions:
          type: array
          description: An array of transactions associated with this settlement request. Each transaction represents a separate blockchain operation related to the settlement process.
          items:
            $ref: '#/components/schemas/PaymentTransaction'
        created_timestamp:
          type: integer
          description: 'The created time of the settlement, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the settlement, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        crypto_address_id:
          type: string
          description: 'Unique identifier for the pre-approved crypto address, used to reference the address securely in requests.'
          example: addr_ethusdt_20250429T134512_a8c31f
        crypto_address:
          type: string
          description: The actual blockchain address to which funds were transferred.
          example: '0xabc123456789def0000000000000000000000000'
        payout_channel:
          $ref: '#/components/schemas/PayoutChannel'
        acquiring_type:
          $ref: '#/components/schemas/AcquiringType'
        settlement_request_id:
          type: string
          description: The settlement request ID generated by Cobo.
          example: S20250304-1001
        order_ids:
          type: array
          description: |
            A list of unique order IDs to be included in this settlement.

            - This field is only applicable when `settlement_type` is set to `Merchant`.
            - If provided, the settlement will only apply to the specified orders.
            - The settlement `amount` must exactly match the total eligible amount from these orders.
            - This ensures consistency between the declared amount and the actual order-level data being settled.
          items:
            $ref: '#/components/schemas/OrderId'
        commission_fee:
          $ref: '#/components/schemas/CommissionFee'
        bridging_fee:
          $ref: '#/components/schemas/BridgingFee'
    SettlementInfo:
      type: object
      required:
        - token
        - available_amount
      properties:
        merchant_id:
          type: string
          example: '123'
          description: 'The merchant ID. For developer balance, this field will be empty.'
        token_id:
          type: string
          description: The ID of the cryptocurrency.
          example: ETH_USDT
        available_amount:
          type: string
          description: 'The amount available for settlement or refund, in the specified cryptocurrency.'
          example: '500.00'
        available_currency_balance:
          type: string
          description: 'The amount available for settlement or refund, in the specified fiat currency.'
          example: '500.00'
        pending_amount:
          type: string
          description: 'The amount unavailable for settlement or refund, in the specified cryptocurrency.'
          example: '500.00'
        pending_currency_balance:
          type: string
          description: 'The amount unavailable for settlement or refund, in the specified fiat currency.'
          example: '500.00'
        settled_amount:
          type: string
          description: 'The amount already settled, in the specified cryptocurrency.'
          example: '500.00'
        available_balance:
          type: string
          description: 'The balance available for settlement or refund, in the specified fiat currency.'
          example: '500.00'
        total_balance:
          type: string
          description: 'The balance total for settlement or refund, in the specified fiat currency.'
          example: '500.00'
        acquiring_type:
          $ref: '#/components/schemas/AcquiringType'
        created_timestamp:
          type: integer
          description: 'The created time of the settlement, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the settlement, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    SettlementType:
      type: string
      enum:
        - Merchant
        - Psp
      example: Merchant
      description: |
        Specifies the source of funds for the settlement:
        - `Merchant`: The settlement amount will be deducted from the merchant balance.
        - `Psp`: The settlement amount will be deducted from the developer balance.
    PaymentTransaction:
      type: object
      required:
        - tx_id
        - from_address
        - to_address
        - amount
        - status
        - created_timestamp
        - updated_timestamp
      properties:
        tx_id:
          type: string
          description: The transaction ID.
          example: tx_123e4567-e89b-12d3-a456-426614174003
        tx_hash:
          type: string
          description: The transaction hash.
          example: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
        token_id:
          type: string
          description: The ID of the cryptocurrency.
          example: ETH_USDT
        from_address:
          type: string
          description: The source address of the transaction.
          example: '0xF8e4bfc10A2821DF52D3322cB5170E5E9276b537'
        to_address:
          type: string
          description: The destination address of the transaction.
          example: '0x15B95A2D8af95D9F48148667B6b8B3CdF89e4F15'
        amount:
          type: string
          description: 'The amount of cryptocurrency transferred, as a decimal string.'
          example: '0.15'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        counterparty:
          $ref: '#/components/schemas/Counterparty'
        destination:
          $ref: '#/components/schemas/Destination'
        created_timestamp:
          type: integer
          format: int64
          description: 'The time when the transaction was created, in Unix timestamp format, measured in milliseconds.'
          example: 1610445878970
        updated_timestamp:
          type: integer
          format: int64
          description: 'The time when the transaction was updated, in Unix timestamp format, measured in milliseconds.'
          example: 1610445878970
    CryptoAddress:
      type: object
      required:
        - token_id
        - crypto_address_id
        - address
      properties:
        token_id:
          type: string
          description: 'The token identifier (e.g., ETH_USDT, TRON_USDT) that this address is associated with.'
          example: ETH_USDT
        crypto_address_id:
          type: string
          description: 'Unique identifier for the pre-approved crypto address, used to reference the address securely in requests. This ID is returned by the system and should be used instead of the raw blockchain address in API calls.'
          example: addr_ethusdt_20250429T134512_a8c31f
        address:
          type: string
          description: The actual blockchain address to which funds will be transferred. This is for display purposes only; external clients should always use address_id to refer to the address in secure operations.
          example: '0xabc123456789def0000000000000000000000000'
        label:
          type: string
          description: 'A human-readable label or alias for the crypto address, set by the merchant or platform operator. This field is optional and intended to help distinguish addresses by usage or purpose (e.g., "Main Payout Wallet", "Cold Wallet").'
          example: Main Payout Wallet
        created_timestamp:
          type: integer
          description: 'The created time of the crypto address, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the crypto address, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    PayoutChannel:
      type: string
      enum:
        - Crypto
        - OffRamp
      example: Crypto
      description: |
        PayoutChannel defines the method by which settlement funds are paid out:
        - `Crypto`: Funds will be settled to a pre-approved blockchain crypto address. (Requires crypto_address_id and token_id to be specified.)
        - `OffRamp`: Funds will be settled through an off-ramp to a fiat bank account by fiat currency exchange rate. (Requires bank_account_id and currency to be specified.)
    AcquiringType:
      type: string
      enum:
        - Order
        - TopUp
        - Subscription
      example: Order
      description: |
        AcquiringType defines the acquisition logic used in the payment flow:
        - `Order`: Each order is created with a specific amount and associated payment request. Funds are settled on a per-order basis.
        - `TopUp`: Recharge-style flow where funds are topped up to a payer balance or account. Useful for flexible or usage-based payment models.
        - `Subscription`: Subscription.
    SupportedToken:
      type: object
      required:
        - token_id
        - name
        - symbol
        - decimal
        - token_address
        - chain_id
        - chain_symbol
      properties:
        token_id:
          type: string
          description: 'The unique identifier of the token, in the format of `{chain_id}_{token_symbol}`.'
          example: ETH_USDT
        name:
          type: string
          description: The full name of the token.
          example: Tether USD
        symbol:
          type: string
          description: The symbol of the token.
          example: USDT
        decimal:
          type: integer
          description: |
            The number of decimal places for the token. This value is used to convert 
            between the token's smallest unit and its display value.
          example: 6
        token_address:
          type: string
          description: |
            The contract address of the token. This is `null` for native coins (e.g., ETH on Ethereum).
          example: '0xdac17f958d2ee523a2206206994597c13d831ec7'
          nullable: true
        chain_id:
          type: string
          description: The ID of the chain on which the token exists.
          example: ETH
        chain_symbol:
          type: string
          description: The symbol of the chain on which the token exists.
          example: ETH
          nullable: true
        chain_icon_url:
          type: string
          description: The URL of the chain icon image.
          example: 'https://d.cobo.com/public/logos/ETH.png'
          nullable: true
        token_icon_url:
          type: string
          description: The URL of the token icon image.
          example: 'https://d.cobo.com/public/logos/USDT.png'
          nullable: true
        can_off_ramp:
          type: boolean
          description: |
            Whether the token supports fiat off-ramp.
            - `true`: The token can be used for fiat off-ramp.
            - `false`: The token cannot be used for fiat off-ramp.
    Account:
      type: object
      description: 'Details of a payment account used for top-up operations, including address and balance metadata.'
      required:
        - token_id
        - address
        - merchant_balance
        - psp_balance
      properties:
        token_id:
          type: string
          description: The ID of the cryptocurrency.
          example: ETH_USDT
        address:
          type: string
          description: The token receiving address of the account.
          example: '0xF8e4bfc10A2821DF52D3322cB5170E5E9276b537'
        merchant_balance:
          type: string
          description: 'The merchant account balance, as a decimal string.'
          example: '0.15'
        psp_balance:
          type: string
          description: 'The PSP account balance, as a decimal string.'
          example: '0.15'
        created_timestamp:
          type: integer
          format: int64
          description: 'The time when the account was created, in Unix timestamp format, measured in milliseconds.'
          example: 1610445878970
        updated_timestamp:
          type: integer
          format: int64
          description: 'The time when the account was updated, in Unix timestamp format, measured in milliseconds.'
          example: 1610445878970
    PayerAccount:
      type: object
      required:
        - merchant_id
        - payer_id
        - developer_fee_rate
      properties:
        merchant_id:
          type: string
          description: 'Merchant ID, e.g., "M1001"'
          example: M1001
        payer_id:
          type: string
          description: |
            Unique payer identifier on the Cobo side, auto-generated by the system.
          example: P20250619T0310056d7aa
        developer_fee_rate:
          type: string
          description: 'Developer fee rate for this token, e.g., "0.01" represents 1%'
          example: '0.01'
        created_timestamp:
          type: integer
          description: 'The created time of the payer, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the payer, represented as a UNIX timestamp in seconds.'
          example: 1744693200
        accounts:
          type: array
          description: An array of accounts associated with this payer.
          items:
            $ref: '#/components/schemas/Account'
    ForcedSweepRequest:
