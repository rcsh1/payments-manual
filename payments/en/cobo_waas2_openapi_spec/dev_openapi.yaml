              data:
                type: array
                items:
                  type: object
                  required:
                    - merchant_id
                    - payer_id
                    - developer_fee_rate
                  properties:
                    merchant_id:
                      type: string
                      description: 'Merchant ID, e.g., "M1001"'
                      example: M1001
                    payer_id:
                      type: string
                      description: |
                        Unique payer identifier on the Cobo side, auto-generated by the system.
                      example: P20250619T0310056d7aa
                    custom_payer_id:
                      type: string
                      description: |
                        Unique user identifier on the merchant side, used to assign a dedicated deposit address.
                      example: user_abc_10001
                    developer_fee_rate:
                      type: string
                      description: 'Developer fee rate for this token, e.g., "0.01" represents 1%'
                      example: '0.01'
                    created_timestamp:
                      type: integer
                      description: 'The created time of the payer, represented as a UNIX timestamp in seconds.'
                      example: 1744689600
                    updated_timestamp:
                      type: integer
                      description: 'The updated time of the payer, represented as a UNIX timestamp in seconds.'
                      example: 1744693200
                    transactions:
                      type: array
                      description: |
                        An array of transactions associated with this payer.

                        <Note>This field returns up to the latest 200 transactions only and will be removed in a future version. Use the dedicated payer transactions API to paginate through transactions.</Note>
                      items:
                        $ref: '#/components/schemas/PaymentTransaction'
