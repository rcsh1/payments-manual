          description: Beneficiary's city.
          example: New York
        created_timestamp:
          type: integer
          description: 'The created time of the bank account, represented as a UNIX timestamp in seconds.'
          example: 1744689600
        updated_timestamp:
          type: integer
          description: 'The updated time of the bank account, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    ExchangeRate:
      type: object
      required:
        - token_id
        - currency
        - rate
      properties:
        token_id:
          type: string
          description: 'The token ID, which identifies the cryptocurrency.'
          example: ETH_USDT
        currency:
          type: string
          description: The fiat currency.
          example: USD
        rate:
          type: string
          description: 'The current exchange rate between the specified currency pair. Expressed as the amount of fiat currency per one unit of cryptocurrency. For example, if the cryptocurrency is USDT and the fiat currency is USD, a rate of "0.99" means 1 USDT = 0.99 USD.'
          example: '1.00'
    AllocationItem:
      type: object
      required:
        - allocation_item_id
        - batch_allocation_id
        - token_id
        - amount
        - description
      properties:
        allocation_item_id:
          type: string
          description: The allocation item ID generated by Cobo.
          example: 123e457-e89b-12d3-a456-426614174004
        batch_allocation_id:
          type: string
          description: The batch allocation ID generated by Cobo.
          example: 123e457-e89b-12d3-a456-426614174004
        token_id:
          type: string
          description: |
            The ID of the cryptocurrency you want to allocation. Supported values: 
            - USDC: `ETH_USDC`, `ARBITRUM_USDC`, `SOL_USDC`, `BASE_USDC`, `MATIC_USDC`, `BSC_USDC`
            - USDT: `TRON_USDT`, `ETH_USDT`, `ARBITRUM_USDT`, `SOL_USDT`, `BASE_USDT`, `MATIC_USDT`, `BSC_USDT`
          example: ETH_USDT
        amount:
          type: string
          description: |
            The allocation amount.
          example: '500.00'
        source_account:
          type: string
        destination_account:
          type: string
        description:
          type: string
    AllocationParam:
      type: object
      required:
        - token_id
        - amount
        - source_account
        - destination_account
        - description
      properties:
        token_id:
          type: string
          description: |
            The ID of the cryptocurrency you want to allocation. Supported values: 
            - USDC: `ETH_USDC`, `ARBITRUM_USDC`, `SOL_USDC`, `BASE_USDC`, `MATIC_USDC`, `BSC_USDC`
            - USDT: `TRON_USDT`, `ETH_USDT`, `ARBITRUM_USDT`, `SOL_USDT`, `BASE_USDT`, `MATIC_USDT`, `BSC_USDT`
          example: ETH_USDT
        amount:
          type: string
          description: |
            The allocation amount.
          example: '500.00'
        source_account:
          type: string
        destination_account:
          type: string
        description:
          type: string
    BatchAllocation:
      type: object
      required:
        - batch_allocation_id
        - request_id
        - created_timestamp
        - updated_timestamp
      properties:
        batch_allocation_id:
          type: string
          description: The batch allocation ID generated by Cobo.
          example: 123e457-e89b-12d3-a456-426614174004
        request_id:
          type: string
          description: The request ID provided by you when creating the batch allocation.
          example: 123e457-e89b-12d3-a456-426614174004
        allocation_params:
          type: array
          items:
            $ref: '#/components/schemas/AllocationParam'
        initiator:
          type: string
          description: 'The initiator of this batch allocation, usually the user''s API key.'
