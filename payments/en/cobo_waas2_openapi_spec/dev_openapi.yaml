        transaction_id:
          type: string
          description: The transaction reference id at bank side.
          example: 20241223-0000008740
        master_account_no:
          type: string
          description: The master account number.
          example: '1234567890'
        account_no:
          type: string
          description: The virtual account number.
          example: '1234567890'
        currency:
          type: string
          description: The currency of the virtual account.
          example: USD
        amount:
          type: string
          description: The amount of the transaction.
          example: '100.00'
        remarks:
          type: string
          description: The remarks of the transaction.
