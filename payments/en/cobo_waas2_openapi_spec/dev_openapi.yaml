      description: |
        The status of the virtual account.
        - `Pending`: The virtual account is created while has not been assigned KYC, no transaction is allowed.
        - `Active`: The virtual account is active and ready for transaction.
        - `Closed`: The virtual account is closed and cannot be used anymore.
        - `Blocked`: The virtual account is blocked at bank side.
