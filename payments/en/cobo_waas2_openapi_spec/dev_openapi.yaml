            Optional URL to the developer's logo image. The logo may be displayed to end users during the payment process. 
            Supported formats: PNG, JPG, SVG. Maximum file size: 2MB.
          example: 'https://example.com/logo.png'
          format: uri
        return_url:
          type: string
          description: The URL to redirect to after the operation completes.
          example: 'https://example.com/return'
          format: uri
    OrderLinkBusinessInfo:
      type: object
      required:
        - fee_amount
        - merchant_id
        - psp_order_code
      properties:
        merchant_id:
          type: string
          description: The merchant ID.
          example: '1001'
        merchant_order_code:
          type: string
          description: A unique reference code assigned by the merchant to identify this order in their system. The code should have a maximum length of 128 characters.
          example: M20240201001
        psp_order_code:
          type: string
          description: |
            A unique reference code assigned by you as a developer to identify this order in your system. This code must be unique across all orders in your system. The code should have a maximum length of 128 characters.
          example: P20240201001
        pricing_currency:
          type: string
          description: |
            The currency for the base order amount and the developer fee. Currently, only `USD`/`USDT`/`USDC` are supported.
          example: USD
        pricing_amount:
          type: string
          description: |
            The base amount of the order, excluding the developer fee (specified in `fee_amount`), in the currency specified by `currency`. If `currency` is not specified, the amount is in the cryptocurrency specified by `token_id`.

            Values must be greater than `0` and contain two decimal places.
          example: '100.00'
        fee_amount:
          type: string
          description: |
            The developer fee for the order, in the currency specified by `currency`. If `currency` is not specified, the fee is in the cryptocurrency specified by `token_id`.

            If you are a merchant directly serving payers, set this field to `0`. Developer fees are only relevant for platforms like payment service providers (PSPs) that charge fees to their downstream merchants.

            The developer fee is added to the base amount (`order_amount`) to determine the final charge. For example:
            - Base amount (`order_amount`): "100.00"
            - Developer fee (`fee_amount`): "2.00"
            - Total charged to customer: "102.00"

            Values can contain up to two decimal places.
          example: '2.00'
        payable_currencies:
          type: array
          description: |
            List of supported cryptocurrency token IDs for this payment. Each token ID must be from the supported values.
          items:
            type: string
            example: ETH_USDT
          example:
            - ETH_USDT
            - SOL_USDC
            - TRON_USDT
        payable_amounts:
          type: array
          description: |
            Optional list of payable amounts for different tokens. If provided, these amounts will be used instead of calculating the amounts based on the exchange rate.
          items:
            type: object
            properties:
              token_id:
                type: string
                description: The cryptocurrency token ID
                example: ETH_USDT
              amount:
                type: string
                description: The actual payable amount of the order in the cryptocurrency.
                example: '103.03'
            required:
              - token_id
              - amount
          example:
            - token_id: ETH_USDT
              amount: '103.03'
            - token_id: SOL_USDC
              amount: '105.05'
        expired_in:
          type: integer
          description: |
            The number of seconds until the pay-in order expires, counted from when the request is sent. For example, if set to `1800`, the order will expire in 30 minutes. Must be greater than zero and cannot exceed 3 hours (10800 seconds). After expiration:

            - The order status becomes final and cannot be changed
            - The `received_token_amount` field will no longer be updated
            - Funds received after expiration will be categorized as late payments and can only be settled from the developer balance.
            - A late payment will trigger a `transactionLate` webhook event.
          default: 1800
          example: 1800
        amount_tolerance:
          type: string
          description: 'Allowed amount deviation, precision to 1 decimal place.'
          example: '0.5'
        currency:
          type: string
          description: |
            The currency for the base order amount and the developer fee. Currently, only `USD`/`USDT`/`USDC` are supported.
          example: USD
        order_amount:
          type: string
          description: |
            The base amount of the order, excluding the developer fee (specified in `fee_amount`), in the currency specified by `currency`. If `currency` is not specified, the amount is in the cryptocurrency specified by `token_id`.

            Values must be greater than `0` and contain two decimal places.
          example: '100.00'
        token_ids:
          type: array
          description: |
            List of supported cryptocurrency token IDs for this payment. Each token ID must be from the supported values.
          items:
            type: string
            example: ETH_USDT
          example:
            - ETH_USDT
            - SOL_USDC
            - TRON_USDT
        custom_exchange_rates:
          type: array
          description: |
            Optional list of final exchange rates for different tokens. If provided, these rates will be used instead of real-time market rates.
          items:
            type: object
            properties:
              token_id:
                type: string
                description: The cryptocurrency token ID
                example: ETH_USDT
              exchange_rate:
                type: string
                description: The fixed exchange rate to use for this token
                example: '0.99'
            required:
              - token_id
              - exchange_rate
          example:
            - token_id: ETH_USDT
              exchange_rate: '0.99'
            - token_id: SOL_USDC
              exchange_rate: '1.02'
        use_dedicated_address:
          type: boolean
          description: |
            Whether to allocate a dedicated address for this order. 
            - `true`: A dedicated address will be allocated for this order.
            - `false`: A shared address from the address pool will be used.
          example: false
    RefundLinkBusinessInfo:
