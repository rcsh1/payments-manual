              example: GET
            url_path:
              type: string
              description: The URL path of the API request.
              example: /internal/bank_gateway/payouts
            query_string:
              type: object
              description: The query parameters of the API request.
              example: foo=bar
            body_string:
              type: string
              description: The body of the API request.
              example: '{}'
        - type: object
          required:
            - org_id
            - org_name
          properties:
            org_id:
              type: string
              description: The ID of the organization.
              example: 123e4567-e89b-12d3-a456-426614174003
            org_name:
              type: string
              description: The name of the organization.
              example: Example Org
            crypto_amount:
              type: string
              description: The amount of the cryptocurrency.
              example: '100.00'
            is_va_transfer:
              type: boolean
              description: Whether the payout is transfer between virtual accounts
    BankSignatureResultSgb:
      type: object
      required:
        - status
        - bank_provider
      properties:
        status:
          $ref: '#/components/schemas/BankSignatureStatus'
        bank_provider:
          $ref: '#/components/schemas/BankProvider'
        client_key:
          type: string
          description: The public key of the signer.
          example: 34asdf1234567890asdf1234567890asdf1234567890asdf1234567890asdf1234567890
        timestamp:
          type: string
          description: The timestamp of the signature.
          example: 1744689600
        signature:
          type: string
          description: The signature of the payout that needs to be signed by the signer.
          example: abc123456789def0000000000000000000000000
    BankSignatureStatus:
      type: string
      enum:
        - PendingRiskCheck
        - RiskRejected
        - PendingApproval
        - Approved
        - Signing
        - Signed
      example: Signed
      description: |
        The status of the signature.
        - `PendingRiskCheck`: The signature is pending risk check.
        - `RiskRejected`: The signature is risk rejected.
        - `PendingApproval`: The signature is pending approval.
        - `Approved`: The signature is approved.
        - `Signing`: The signature is signing.
        - `Signed`: The signature is signed.
    BankDeposit:
      type: object
