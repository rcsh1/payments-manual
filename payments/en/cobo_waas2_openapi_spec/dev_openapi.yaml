          schema:
            type: object
            required:
              - request_id
              - bank_provider
              - transaction_currency
              - transaction_amount
              - sender
              - beneficiary
            properties:
              request_id:
                type: string
                description: The request ID that is used to track a payout request. The request ID is provided by you and must be unique.
                example: 123e457-e89b-12d3-a456-426614174004
              bank_provider:
                $ref: '#/components/schemas/BankProvider'
              transaction_currency:
                type: string
                description: The currency of the transaction.
                example: USD
              transaction_amount:
                type: string
                description: The amount of the transfer.
                example: '100.00'
              fee_currency:
                type: string
                description: The currency of the fee.
                example: USD
              remarks:
                type: string
                description: The remarks of the payout.
                example: Please send the payment to the vendor's bank account.
              force_external:
                type: boolean
                description: Whether to force the payout to be remittance between bank accounts.
                example: false
              crypto_amount:
                type: string
                description: The amount of the cryptocurrency.
                example: '100.00'
              sender:
                $ref: '#/components/schemas/BankPayoutSender'
              beneficiary:
                $ref: '#/components/schemas/BankPayoutBeneficiary'
