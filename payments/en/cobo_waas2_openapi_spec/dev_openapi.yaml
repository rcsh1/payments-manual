    CreateSettlement:
      type: object
      required:
        - token_id
      properties:
        merchant_id:
          type: string
          description: |
            Only used in Merchant settlement type.
            The merchant ID.
          example: M1001
        token_id:
          type: string
          description: |
            Only used in Crypto payout channel.
            The ID of the cryptocurrency you want to settle. Supported values: 
            - USDC: `ETH_USDC`, `ARBITRUM_USDC`, `SOL_USDC`, `BASE_USDC`, `MATIC_USDC`, `BSC_USDC`
            - USDT: `TRON_USDT`, `ETH_USDT`, `ARBITRUM_USDT`, `SOL_USDT`, `BASE_USDT`, `MATIC_USDT`, `BSC_USDT`
          example: ETH_USDT
        amount:
          type: string
          description: |
            The settlement amount.
            - In Crypto payout channel, this represents the settlement amount in the specified cryptocurrency.
            - In OffRamp payout channel, this represents the settlement amount in the specified fiat currency.
          example: '500.00'
        crypto_address_id:
          type: string
          description: |
            Only used in Crypto payout channel.
            The ID of the pre-approved crypto address used for Crypto settlements.
            - The value must refer to a valid address that has been pre-configured and approved for the given token.
          example: addr_ethusdt_20250506T123456_ab12cd
        crypto_address:
          type: string
          description: |
            Only used in Crypto payout channel.
            The actual blockchain address to which funds will be transferred.
            If enable destination whitelist, this address must be associated with a destination.
          example: '0xabc123456789def0000000000000000000000000'
        order_ids:
          type: array
          description: |
            A list of unique order IDs to be included in this settlement.

            - This field is only applicable when `settlement_type` is set to `Merchant`.
            - If provided, the settlement will only apply to the specified orders.
            - The settlement `amount` must exactly match the total eligible amount from these orders.
            - This ensures consistency between the declared amount and the actual order-level data being settled.
          items:
            $ref: '#/components/schemas/OrderId'
