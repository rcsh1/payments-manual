        token_id:
          type: string
          example: XLM_USDC
          description: The token ID successful to set as supported for the specified organizations.
  parameters:
    sortByParam:
      name: sort_by
      in: query
      description: The field used for sorting.
      required: false
      schema:
        type: string
        default: ''
      example: timestamp
    directionParam:
      name: direction
      in: query
      description: |
        The sort direction. Possible values include:
          - `ASC`: Sort the results in ascending order.
          - `DESC`: Sort the results in descending order.
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: ASC
      example: ASC
    limitParam:
      name: limit
      in: query
      description: 'The maximum number of objects to return. For most operations, the value range is [1, 50].'
      required: false
      schema:
        type: integer
        format: int32
        default: 10
      example: 10
    limit500Param:
      name: limit
      in: query
      description: 'The maximum number of objects to return. The value range is [1, 500].'
      required: false
      schema:
        type: integer
        format: int32
        default: 10
      example: 10
    beforeParam:
      name: before
      in: query
      description: |
        This parameter specifies an object ID as a starting point for pagination, retrieving data before the specified object relative to the current dataset.  

        Suppose the current data is ordered as Object A, Object B, and Object C.  If you set `before` to the ID of Object C (`RqeEoTkgKG5rpzqYzg2Hd3szmPoj2cE7w5jWwShz3C1vyGSAk`), the response will include Object B and Object A.  

        **Notes**:  
        - If you set both `after` and `before`, an error will occur.
        - If you leave both `before` and `after` empty, the first page of data is returned.
        - If you set it to `infinity`, the last page of data is returned.
      required: false
      schema:
        type: string
      example: RqeEoTkgKG5rpzqYzg2Hd3szmPoj2cE7w5jWwShz3C1vyGmk1
    afterParam:
      name: after
      in: query
      description: |
        This parameter specifies an object ID as a starting point for pagination, retrieving data after the specified object relative to the current dataset.  

        Suppose the current data is ordered as Object A, Object B, and Object C. If you set `after` to the ID of Object A (`RqeEoTkgKG5rpzqYzg2Hd3szmPoj2cE7w5jWwShz3C1vyGSAk`), the response will include Object B and Object C.  

        **Notes**:  
        - If you set both `after` and `before`, an error will occur.
        - If you leave both `before` and `after` empty, the first page of data is returned.
      required: false
      schema:
        type: string
      example: RqeEoTkgKG5rpzqYzg2Hd3szmPoj2cE7w5jWwShz3C1vyGSAk
