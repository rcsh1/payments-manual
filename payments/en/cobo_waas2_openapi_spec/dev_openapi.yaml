          example: a7b8c9d0-e1f2-4a5b-a23c-7890abcdef12
        address:
          type: string
          description: The screened blockchain address.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        chain_id:
          type: string
          description: The chain identifier.
          example: ETH
        status:
          $ref: '#/components/schemas/KyaScreeningStatus'
        created_timestamp:
          type: integer
          format: int64
          description: 'The time when the screening request was created, in Unix timestamp format, measured in milliseconds.'
          example: 1721530814236
        updated_timestamp:
          type: integer
          format: int64
          description: 'The time when the screening status was updated, in Unix timestamp format, measured in milliseconds.'
          example: 1721530899876
