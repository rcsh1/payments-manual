    TransactionFixedFee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the fixed fee model. 

        Switch between the tabs to display the properties for different transaction fee models.
      required:
        - fee_type
      title: Fixed
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: TRON
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
        - $ref: '#/components/schemas/MaxFeeAmount'
    TransactionEvmEip1559Fee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the EIP-1559 fee model. 

        The transaction fee is calculated by multiplying the gas price by the used gas units. This can be expressed as: Transaction fee = gas price * used gas units.

        Switch between the tabs to display the properties for different transaction fee models.
      title: EVM_EIP_1559
      required:
        - fee_type
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: ETH
            effective_gas_price:
              type: string
              description: 'The gas price (gas fee per gas unit) on the chain, in wei. The gas price represents the amount of ETH that must be paid to validators for processing transactions.'
              example: '100000000'
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
            estimated_reserved_fee:
              type: string
              description: The estimated fee required for submitting the transaction data to L1 (Layer 1)
              example: '0.1'
            gas_used:
              type: string
              description: The number of gas units used in the transaction.
              example: '100000000'
        - $ref: '#/components/schemas/EvmEip1559FeeBasePrice'
        - $ref: '#/components/schemas/FeeGasLimit'
    TransactionEvmLegacyFee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the legacy fee model. 

        The transaction fee is calculated by multiplying the gas price by the used gas. This can be expressed as: Transaction fee = gas price * used gas units.

        Switch between the tabs to display the properties for different transaction fee models.
      title: EVM_Legacy
      required:
        - fee_type
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: ETH
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
            estimated_reserved_fee:
              type: string
              description: The estimated fee required for submitting the transaction data to L1 (Layer 1)
              example: '0.1'
            gas_used:
              type: string
              description: The gas units used in the transaction.
              example: '100000000'
        - $ref: '#/components/schemas/EvmLegacyFeeBasePrice'
        - $ref: '#/components/schemas/FeeGasLimit'
    TransactionUtxoFee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the UTXO fee model, such as Bitcoin.

        The transaction fee is calculated by multiplying the fee rate by the transaction size. This can be expressed as: Transaction fee = fee rate * transaction size.

        Switch between the tabs to display the properties for different transaction fee models.
      title: UTXO
      required:
        - fee_type
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: BTC
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
            max_fee_amount:
              type: string
              description: The maximum fee that you are willing to pay for the transaction. The transaction will fail if the transaction fee exceeds the maximum fee.
              example: '0.1'
        - $ref: '#/components/schemas/UtxoFeeBasePrice'
    TransactionSOLFee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the SOL fee model.

        In the SOL fee model, the calculation method for the fee is: fee = base_fee + compute_unit_price * compute_unit_limit + rent_amount, refer to [Fee models](https://www.cobo.com/developers/v2/guides/transactions/estimate-fees#fee-models).

        Switch between the tabs to display the properties for different transaction fee models.
      title: SOL
      required:
        - fee_type
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: BTC
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
        - $ref: '#/components/schemas/SOLBase'
        - $ref: '#/components/schemas/SOLComputeUnit'
    TransactionFILFee:
      type: object
      description: |
        The transaction fee actually charged by the chain that uses the FIL fee model.

        In the Fil fee model, the calculation method for the fee is: fee = gas_fee_cap * gas_limit, refer to [Fee models](https://www.cobo.com/developers/v2/guides/transactions/estimate-fees#fee-models).

        Switch between the tabs to display the properties for different transaction fee models.
      title: FIL
      required:
        - fee_type
      allOf:
        - type: object
          properties:
            fee_type:
              $ref: '#/components/schemas/FeeType'
            token_id:
              type: string
              description: The token ID of the transaction fee.
              example: BTC
            fee_used:
              type: string
              description: The transaction fee.
              example: '0.1'
            estimated_fee_used:
              type: string
              description: The estimated transaction fee.
              example: '0.1'
            gas_used:
              type: string
              description: The gas units used in the transaction.
              example: '100000000'
        - $ref: '#/components/schemas/FILBase'
        - $ref: '#/components/schemas/FILPrice'
    TransactionFee:
      oneOf:
        - $ref: '#/components/schemas/TransactionEvmEip1559Fee'
        - $ref: '#/components/schemas/TransactionEvmLegacyFee'
        - $ref: '#/components/schemas/TransactionUtxoFee'
        - $ref: '#/components/schemas/TransactionFixedFee'
