        - `action=PREPARE`: returned challenge has `status=PREPARE`; the 180-minute countdown is not started yet.
        - `action=SUBMIT`: returned challenge has `status=PENDING`; `started_at` and `expires_at` are set.

        If the counterparty address has already been verified (by signature or a prior Satoshi Test), this operation returns HTTP 400 `ADDRESS_ALREADY_VERIFIED` instead — call [List address verifications](#operation/list_address_verifications) with `chain_id`, `address`, and `status=VERIFIED` first to pre-check.
