    SignatureChallenge:
      type: object
      title: Signature challenge
      description: |
        A signature challenge for self-custody wallet verification. The wallet owner must sign the `challenge` string with the wallet associated with `address` and submit the signature via [Submit Travel Rule information for deposits](#operation/submit_deposit_travel_rule_info) or [withdrawals](#operation/submit_withdraw_travel_rule_info). The challenge is time-bounded — each call rotates the challenge and only the most recently-issued value will verify.
      required:
        - address
        - challenge
        - expires_in
      properties:
        address:
          type: string
          description: |
            The self-custody wallet address that must sign this challenge. This is the counterparty address for the transaction: for deposits it is the sender's wallet, and for withdrawals it is the recipient's wallet.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        challenge:
          type: string
          description: |
            The human-readable, time-sensitive message to sign. Contains the wallet address, a unique nonce, and a timestamp.
          example: |
            Hi, please sign this message to confirm that you are the owner of this wallet address.
            The transfer can only proceed after signing.
            - Address: 0x1234567890abcdef1234567890abcdef12345678
            - Nonce: b2860f5c9f201a81bc76f33e991c1f24
            - Timestamp: 1732523887
        expires_in:
          type: integer
          format: int32
          description: Number of seconds before the challenge expires. The signature must be submitted within this window.
          example: 30
    CreateSatoshiTestChallengeRequest:
      type: object
      title: Create Satoshi Test challenge request
      description: |
        Request body for creating a Satoshi Test challenge. A single endpoint covers both the two-step flow (`PREPARE` then `SUBMIT`) and the one-shot flow (`SUBMIT` directly). Idempotent on `(chain_id, from_address)` per organization.
      required:
        - action
        - chain_id
        - from_address
        - transaction_id
        - transaction_type
      properties:
        action:
          $ref: '#/components/schemas/SatoshiTestChallengeAction'
        chain_id:
          type: string
          description: The chain ID of the counterparty address. See the operation description for supported chains.
          example: ETH
        from_address:
          type: string
          description: The counterparty (self-custody) wallet address that will transfer the micro-deposit.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        transaction_id:
          type: string
          format: uuid
          description: The Cobo transaction ID that this Satoshi Test is verifying for.
          example: 123e4567-e89b-12d3-a456-426614174000
        transaction_type:
          $ref: '#/components/schemas/TravelRuleTransactionType'
        challenge_id:
          type: string
          format: uuid
          description: |
            Optional. The `challenge_id` returned by a previous `PREPARE` call.
            - When `action=SUBMIT`: if provided, activates that specific challenge by id (recommended when you cached the id client-side after `PREPARE`). If omitted, the server activates the latest matching challenge identified by `(chain_id, from_address)`.
            - When `action=PREPARE`: ignored.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    CancelSatoshiTestChallengeRequest:
      type: object
      title: Cancel Satoshi Test challenge request
      description: Request body for cancelling a Satoshi Test challenge that is in `PREPARE` or `PENDING` status.
      required:
        - challenge_id
      properties:
        challenge_id:
          type: string
          format: uuid
          description: The challenge ID to cancel.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    SatoshiTestChallenge:
      type: object
      title: Satoshi Test challenge
      description: 'Full information about a Satoshi Test challenge, returned by the create and get operations.'
      required:
        - challenge_id
        - from_address
        - to_address
        - amount
        - token_id
        - chain_id
        - status
        - remaining_seconds
      properties:
        challenge_id:
          type: string
          format: uuid
          description: The unique identifier of the Satoshi Test challenge.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        from_address:
          type: string
          description: The counterparty (self-custody) wallet address that must transfer the micro-deposit.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        to_address:
          type: string
          description: The Cobo-generated verification address that will receive the micro-deposit.
          example: '0xabcdef1234567890abcdef1234567890abcdef12'
        amount:
          type: string
          description: |
            The exact amount (in the token's smallest unit) that must be transferred. The amount is unique per challenge and is used together with `to_address` to identify a matching on-chain transfer.
          example: '1100001000000000'
        token_id:
          type: string
          description: The ID of the token used for the micro-deposit (typically the chain's native asset).
          example: ETH
        chain_id:
          type: string
          description: The chain on which the micro-deposit is expected.
          example: ETH
        status:
          $ref: '#/components/schemas/SatoshiTestChallengeStatus'
        remaining_seconds:
          type: integer
          description: |
            Remaining time (in seconds) before the challenge expires. `0` when the challenge is not yet submitted or has already completed/expired.
          example: 10550
        matched_txid:
          type: string
          nullable: true
          description: 'The on-chain transaction hash of the matching transfer, once matched.'
          example: 0xabc123...
        started_at:
          type: integer
          format: int64
          nullable: true
          description: Timestamp (milliseconds) when the challenge was submitted and the countdown started.
          example: 1732523887000
        expires_at:
          type: integer
          format: int64
          nullable: true
          description: Timestamp (milliseconds) when the challenge will expire if not matched.
          example: 1732534687000
    SatoshiTestChallengeStatus:
      type: string
      enum:
        - PREPARE
        - PENDING
        - MATCHED
        - VERIFIED
        - EXPIRED
        - DELETED
      example: PENDING
      description: |
        The lifecycle status of a Satoshi Test challenge.
        - `PREPARE`: Challenge created (address and amount returned); the 180-minute countdown is not started yet.
        - `PENDING`: Challenge submitted; countdown active, waiting for the counterparty's on-chain transfer.
        - `MATCHED`: An on-chain transfer matching the expected amount has been observed; waiting for block confirmations.
        - `VERIFIED`: The matched transfer reached confirmation — the address is verified.
        - `EXPIRED`: Challenge was not matched within 180 minutes.
        - `DELETED`: Challenge was cancelled by the client.
    SatoshiTestChallengeAction:
      type: string
      enum:
        - PREPARE
        - SUBMIT
      example: PREPARE
      description: |
        The action to perform when creating a Satoshi Test challenge.
        - `PREPARE`: Preview the verification address and amount. The 180-minute countdown is NOT started yet. Repeated `PREPARE` calls for the same `(chain_id, from_address)` refresh the amount.
        - `SUBMIT`: Activate the challenge and start the 180-minute countdown. If a `PREPARE` challenge already exists for this `(chain_id, from_address)` it is activated; otherwise a new challenge is created directly in `PENDING` state (one-shot flow).
    SatoshiTestCancelResult:
      type: object
      title: Satoshi Test cancel result
      description: 'Returned by [Cancel Satoshi Test challenge](#operation/cancel_satoshi_test_challenge).'
      required:
        - challenge_id
        - status
      properties:
        challenge_id:
          type: string
          format: uuid
          description: The challenge that was cancelled.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        status:
          type: string
          enum:
            - DELETED
          description: Final status after cancellation.
          example: DELETED
    AddressVerification:
      type: object
      title: Address verification
      description: |
        Summary of a self-custody address verification record. Returned as items in [List address verifications](#operation/list_address_verifications). Call [Get address verification](#operation/get_address_verification) with `verification_id` to retrieve method-specific provenance (`satoshi_test_detail` / `signature_detail`).
      required:
        - verification_id
        - address
        - chain_id
        - status
        - verification_method
      properties:
        verification_id:
          type: string
          format: uuid
          description: The unique identifier of this verification record.
          example: fb377ea5-a97a-49b4-955d-23f8fdd5177a
        address:
          type: string
          description: The counterparty (self-custody) wallet address being verified.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        chain_id:
          type: string
          description: The chain on which this address is verified.
          example: ETH
        status:
          $ref: '#/components/schemas/AddressVerificationStatus'
        verification_method:
          $ref: '#/components/schemas/AddressVerificationMethod'
        verified_at:
          type: integer
          format: int64
          nullable: true
          description: Timestamp (milliseconds) when verification completed. `null` while `status=PENDING` or `FAILED`.
          example: 1732523887000
    AddressVerificationDetail:
      type: object
      title: Address verification detail
      description: |
        Full detail of a single address verification record, including method-specific provenance.

        - `verification_method=SIGNATURE` → `signature_detail` is populated, `satoshi_test_detail` is `null`.
        - `verification_method=SATOSHI_TEST` → `satoshi_test_detail` carries the latest challenge state (`status`, `remaining_seconds`, `matched_txid`); `signature_detail` is `null`.
      required:
        - verification_id
        - address
        - chain_id
        - status
        - verification_method
      properties:
        verification_id:
          type: string
          format: uuid
          description: The unique identifier of this verification record.
          example: fb377ea5-a97a-49b4-955d-23f8fdd5177a
        address:
          type: string
          description: The counterparty (self-custody) wallet address being verified.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        chain_id:
          type: string
          description: The chain on which this address is verified.
          example: ETH
        status:
          $ref: '#/components/schemas/AddressVerificationStatus'
        verification_method:
          $ref: '#/components/schemas/AddressVerificationMethod'
        verified_at:
          type: integer
          format: int64
          nullable: true
          description: Timestamp (milliseconds) when verification completed. `null` while `status=PENDING` or `FAILED`.
          example: 1732523887000
        satoshi_test_detail:
          nullable: true
          description: |
            The latest Satoshi Test challenge associated with this verification. Present only when `verification_method=SATOSHI_TEST`.
          allOf:
            - $ref: '#/components/schemas/SatoshiTestChallenge'
        signature_detail:
          nullable: true
          description: |
            Off-chain signature provenance. Present only when `verification_method=SIGNATURE`.
          allOf:
            - $ref: '#/components/schemas/SignatureDetail'
    AddressVerificationStatus:
      type: string
      enum:
        - PENDING
        - VERIFIED
        - FAILED
      example: VERIFIED
      description: |
        The lifecycle status of an address verification record.
        - `PENDING`: A Satoshi Test challenge is in progress (countdown active or awaiting confirmation).
        - `VERIFIED`: The address ownership has been confirmed (by signature or by a matched Satoshi Test transfer).
        - `FAILED`: The verification attempt did not succeed (Satoshi Test expired without match, or signature verification rejected).
    SignatureDetail:
      type: object
      title: Signature verification detail
      description: |
        Details of an off-chain signature that verified a self-custody address. Returned only when `verification_method=SIGNATURE`.
      required:
        - address
      properties:
        address:
          type: string
          description: The self-custody wallet address that signed the challenge.
          example: '0x1234567890abcdef1234567890abcdef12345678'
        challenge:
          type: string
          nullable: true
          description: The challenge string that was signed.
          example: |
            Hi, please sign this message to confirm that you are the owner of this wallet address.
            - Nonce: b2860f5c9f201a81bc76f33e991c1f24
            - Timestamp: 1732523887
        signature:
          type: string
          nullable: true
          description: The wallet signature submitted by the client.
          example: '0x4355c6b7e1f3d2a09c8b7e6f5d4c3b2a1908f7e6d5c4b3a2918f7e6d5c4b3a2918f7e6d5c4b3a2918f7e6d5c4b3a2918f7e6d5c4b3a2918f7e6d5c4b3a291b'
        verified_at:
          type: integer
          format: int64
          nullable: true
          description: Timestamp (milliseconds) when the signature was verified.
          example: 1732523887000
    ListAddressVerifications200Response:
      type: object
      title: List address verifications response
      description: Paginated list of address verification records.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          description: The page of address verification records.
          items:
            $ref: '#/components/schemas/AddressVerification'
        pagination:
          $ref: '#/components/schemas/Pagination'
    AddressVerificationMethod:
      type: string
      enum:
        - SIGNATURE
        - SATOSHI_TEST
      example: SATOSHI_TEST
      description: |
        How a self-custody address was verified.
        - `SIGNATURE`: Verified by off-chain wallet signature (via `Get a self-custody signature challenge` + signed message).
        - `SATOSHI_TEST`: Verified by an on-chain micro-deposit (via Satoshi Test challenge).
    TravelRuleTransactionType:
      type: string
      enum:
        - DEPOSIT
        - WITHDRAW
      example: DEPOSIT
      description: |
        The direction of the underlying transaction in a Travel Rule operation.
        - `DEPOSIT`: A deposit transaction (verifying the source address).
        - `WITHDRAW`: A withdrawal transaction (verifying the destination address).
