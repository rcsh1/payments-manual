        updated_timestamp:
          type: integer
          description: 'The updated time of the payout, represented as a UNIX timestamp in seconds.'
          example: 1744689600
    BankVirtualAccountStatus:
      type: string
      enum:
        - Pending
        - Active
        - Closed
        - Blocked
